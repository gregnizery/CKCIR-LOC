services:
  - type: web
    name: ckcir-location
    runtime: docker
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: CHROME_EXECUTABLE_PATH
        value: /usr/bin/chromium
